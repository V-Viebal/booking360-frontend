name: Booking360 Frontend Deploy

permissions:
  contents: read
  id-token: write

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: booking360-frontend-production
  cancel-in-progress: false

env:
  INFISICAL_API_URL: https://keys.hmz.one
  INFISICAL_PROJECT_SLUG: infra-7-yf9
  INFISICAL_IDENTITY_ID: f3d895ca-b764-4c66-9490-e6145cc854a9
  INFISICAL_ENV_SLUG: prod
  INFISICAL_DEPLOY_SHARED_PATH: /booking360/deploy/shared
  INFISICAL_RUNTIME_PATH: /booking360/production/frontend
  IMAGE_REPO: vviebal/booking360-frontend
  DEFAULT_RELEASE_DIR: /opt/apps/booking360
  FRONTEND_DOMAIN: book360.hmz.one
  API_DOMAIN: api-book360.hmz.one

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install
        run: npm ci --legacy-peer-deps

      - name: Build
        run: npm run build

  deploy:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs:
      - build
    runs-on:
      - self-hosted
      - linux
      - x64
      - 3rd
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve frontend image tag
        id: meta
        shell: bash
        run: |
          set -euo pipefail
          short_sha="${GITHUB_SHA::12}"
          echo "image_tag=${IMAGE_REPO}:production-${short_sha}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Fetch Docker Hub credentials from Infisical
        uses: Infisical/secrets-action@v1.0.12
        with:
          method: "oidc"
          identity-id: ${{ env.INFISICAL_IDENTITY_ID }}
          oidc-audience: "https://github.com/V-Viebal"
          project-slug: ${{ env.INFISICAL_PROJECT_SLUG }}
          env-slug: ${{ env.INFISICAL_ENV_SLUG }}
          domain: ${{ env.INFISICAL_API_URL }}
          secret-path: ${{ env.INFISICAL_DEPLOY_SHARED_PATH }}

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ env.DOCKERHUB_USERNAME }}
          password: ${{ env.DOCKERHUB_TOKEN }}

      - name: Build and push frontend image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ steps.meta.outputs.image_tag }}
            ${{ env.IMAGE_REPO }}:production

      - name: Fetch runtime env file from Infisical
        uses: Infisical/secrets-action@v1.0.12
        with:
          method: "oidc"
          identity-id: ${{ env.INFISICAL_IDENTITY_ID }}
          oidc-audience: "https://github.com/V-Viebal"
          project-slug: ${{ env.INFISICAL_PROJECT_SLUG }}
          env-slug: ${{ env.INFISICAL_ENV_SLUG }}
          domain: ${{ env.INFISICAL_API_URL }}
          secret-path: ${{ env.INFISICAL_RUNTIME_PATH }}
          export-type: "file"
          file-output-path: "runtime.env"

      - name: Prepare release inputs
        shell: bash
        run: |
          set -euo pipefail
          release_dir="${DEFAULT_RELEASE_DIR}"
          runtime_source=""

          for candidate in \
            "./runtime.env" \
            "../runtime.env" \
            "../$(basename "$PWD")runtime.env"
          do
            if [ -f "$candidate" ]; then
              runtime_source="$candidate"
              break
            fi
          done

          if [ -z "$runtime_source" ]; then
            runtime_source="$(find .. -maxdepth 1 -type f -name '*runtime.env' | head -n 1 || true)"
          fi

          if [ -z "$runtime_source" ]; then
            echo "Failed to locate exported runtime env file"
            ls -la .
            ls -la ..
            exit 1
          fi

          mkdir -p "${release_dir}"
          mv "$runtime_source" "${release_dir}/.env.frontend.runtime"
          touch "${release_dir}/.env.backend.runtime"
          current_backend_image="$(docker inspect --format '{{.Config.Image}}' booking360-backend 2>/dev/null || true)"
          if [ -z "${current_backend_image}" ]; then
            current_backend_image="vviebal/booking360-backend:production"
          fi
          echo "RELEASE_DIR=${release_dir}" >> "$GITHUB_ENV"
          echo "FRONTEND_IMAGE_TAG=${{ steps.meta.outputs.image_tag }}" >> "$GITHUB_ENV"
          echo "CURRENT_BACKEND_IMAGE=${current_backend_image}" >> "$GITHUB_ENV"

      - name: Write deploy compose file
        shell: bash
        run: |
          set -euo pipefail
          cat > "${RELEASE_DIR}/compose.deploy.yml" <<EOF
          services:
            booking360-backend:
              image: ${CURRENT_BACKEND_IMAGE}
              container_name: booking360-backend
              restart: unless-stopped
              extra_hosts:
                - "host.docker.internal:host-gateway"
              env_file:
                - .env.backend.runtime
              environment:
                ASPNETCORE_URLS: http://+:8101
                ASPNETCORE_ENVIRONMENT: Production
                APP_ENV_PREFIX: BOOKING360
                APP_FRONTEND_URL: https://${FRONTEND_DOMAIN}
              labels:
                - "traefik.enable=true"
                - "traefik.docker.network=coolify"
                - "traefik.http.routers.booking360-backend.rule=Host(\`${API_DOMAIN}\`)"
                - "traefik.http.routers.booking360-backend.entrypoints=https"
                - "traefik.http.routers.booking360-backend.tls=true"
                - "traefik.http.routers.booking360-backend.tls.certresolver=letsencrypt"
                - "traefik.http.services.booking360-backend.loadbalancer.server.port=8101"
              networks:
                - coolify

            booking360-frontend:
              image: ${FRONTEND_IMAGE_TAG}
              container_name: booking360-frontend
              restart: unless-stopped
              env_file:
                - .env.frontend.runtime
              environment:
                NODE_ENV: production
                HOST: 0.0.0.0
                PORT: 4101
              labels:
                - "traefik.enable=true"
                - "traefik.docker.network=coolify"
                - "traefik.http.routers.booking360-frontend.rule=Host(\`${FRONTEND_DOMAIN}\`)"
                - "traefik.http.routers.booking360-frontend.entrypoints=https"
                - "traefik.http.routers.booking360-frontend.tls=true"
                - "traefik.http.routers.booking360-frontend.tls.certresolver=letsencrypt"
                - "traefik.http.services.booking360-frontend.loadbalancer.server.port=4101"
              networks:
                - coolify

          networks:
            coolify:
              external: true
          EOF

      - name: Pull and start frontend release
        shell: bash
        run: |
          set -euo pipefail
          cd "${RELEASE_DIR}"
          docker pull "${FRONTEND_IMAGE_TAG}"
          docker rm -f booking360-frontend >/dev/null 2>&1 || true
          docker compose -f compose.deploy.yml up -d --no-deps --force-recreate booking360-frontend

      - name: Health check
        shell: bash
        run: |
          set -euo pipefail
          for attempt in $(seq 1 60); do
            if curl -kfsSI --resolve "${FRONTEND_DOMAIN}:443:127.0.0.1" "https://${FRONTEND_DOMAIN}/"; then
              break
            fi

            if [ "$attempt" -eq 60 ]; then
              echo "Local Traefik health check failed after ${attempt} attempts"
              docker logs --tail 120 booking360-frontend || true
              exit 1
            fi

            sleep 5
          done

  verify:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs:
      - deploy
    runs-on:
      - self-hosted
      - linux
      - x64
      - 3rd
    steps:
      - name: Verify root page
        shell: bash
        run: |
          set -euo pipefail
          html="$(curl -fsSL "https://${FRONTEND_DOMAIN}/")"
          printf '%s' "${html:0:500}"
          printf '\n'
          printf '%s' "$html" | grep -qi '<html\|<!doctype html'